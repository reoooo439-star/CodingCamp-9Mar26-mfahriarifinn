<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
            <div class="time-display">
                <div id="time" class="time"></div>
                <div id="date" class="date"></div>
            </div>
            <div class="greeting">
                <span id="greeting-text">Hello</span>, <input type="text" id="user-name" placeholder="enter your name" />
            </div>
        </header>

        <main>
            <section class="todo-section">
                <h2>Today's Tasks</h2>
                <div class="todo-input-group">
                    <input type="text" id="todo-input" placeholder="Add a new task..." />
                    <button id="add-todo">Add</button>
                </div>
                <ul id="todo-list"></ul>
            </section>

            <section class="timer-section">
                <h2>Pomodoro Timer</h2>
                <div class="timer-settings">
                    <label>Work: <input type="number" id="work-time" value="25" min="1" max="60" /> min</label>
                    <label>Break: <input type="number" id="break-time" value="5" min="1" max="30" /> min</label>
                </div>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="start-timer">Start</button>
                    <button id="pause-timer">Pause</button>
                    <button id="reset-timer">Reset</button>
                </div>
                <div id="timer-mode" class="timer-mode">Work Session</div>
            </section>

            <section class="links-section">
                <h2>Quick Links</h2>
                <div class="links-grid" id="links-grid"></div>
                <div class="add-link-form">
                    <input type="text" id="link-name" placeholder="Link name" />
                    <input type="url" id="link-url" placeholder="https://example.com" />
                    <button id="add-link">Add Link</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
